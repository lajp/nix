# Heavily inspired by: https://github.com/Gerschtli/nix-config/blob/master/.github/workflows/ci.yml

name: Build and test flake outputs
on:
  push:
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        description: Branch name to build on
        default: ""
        required: false
        type: string

jobs:
  nix:
    runs-on: "${{ matrix.runs-on }}"

    strategy:
      fail-fast: false
      matrix:
        include:
          - nix-command: build .#nixosConfigurations.ankka.config.system.build.toplevel
            runs-on: ubuntu-24.04-arm
          - nix-command: build .#nixosConfigurations.proxy-pi.config.system.build.toplevel
            runs-on: ubuntu-24.04-arm
          - nix-command: build .#nixosConfigurations.framework.config.system.build.toplevel
            runs-on: ubuntu-latest
          - nix-command: build .#nixosConfigurations.nas.config.system.build.toplevel
            runs-on: ubuntu-latest
          - nix-command: build .#nixosConfigurations.vaasanas.config.system.build.toplevel
            runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        continue-on-error: true
        with:
          tool-cache: true

      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 1G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or, last accessed more than this number of seconds ago
          # relative to the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: 0
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never

      - name: Build command
        run: nix ${{ matrix.nix-command }}
