# Heavily inspired by: https://github.com/Gerschtli/nix-config/blob/master/.github/workflows/update.yml

name: Update inputs
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 1

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    outputs:
      branch: ${{ steps.branch.outputs.branch }}
      update_available: ${{ steps.changes.outputs.update_available }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install nix
        uses: cachix/install-nix-action@v31

      - name: Set branch name output
        id: branch
        run: echo "branch=ci/automatic-update-$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create branch locally
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
        run: git switch -c "$BRANCH_NAME"

      - name: Setup git
        run: |
          git config --global user.email "lajp@iki.fi"
          git config --global user.name "Luukas Pörtfors"

      - name: Update inputs
        run: |
          nix \
            --option commit-lockfile-summary 'flake.inputs: automatic update' \
            flake update \
            --commit-lock-file

      - name: Check for changes
        id: changes
        run: |
          if git diff --exit-code origin/main...; then
            echo "update_available=false" >> $GITHUB_OUTPUT
          else
            echo "update_available=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.changes.outputs.update_available == 'true'
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
        run: git push --force origin "$BRANCH_NAME"

  create-pr:
    runs-on: ubuntu-latest
    needs:
      - update
    if: needs.update.outputs.update_available == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ needs.update.outputs.branch }}
        run: |
          if ! gh pr list --head "$BRANCH" --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update flake inputs ($(date +%Y-%m-%d))" \
              --body "This automated PR updates flake inputs.

          - Created by the **Update inputs** workflow
          - Triggered on schedule or manual dispatch"
          else
            echo "PR already exists for $BRANCH"
          fi
